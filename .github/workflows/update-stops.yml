name: Update TTC Stops

# Runs daily at 6 AM UTC. Only commits when stop data actually changes.
# First-time setup: configure TTC_GTFS_URL in repo Settings → Variables → Actions.
# Then trigger manually via "Run workflow" to populate the initial stops.json.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download and convert TTC stops
        env:
          # Override via repo Settings → Variables → TTC_GTFS_URL if the URL changes.
          TTC_GTFS_URL: ${{ vars.TTC_GTFS_URL || 'https://opendata.toronto.ca/toronto.transit.commission/ttc-routes-and-schedules/OpenData_TTC_Schedules.zip' }}
        run: |
          python3 - << 'EOF'
          import csv, json, zipfile, io, urllib.request, os, sys

          url = os.environ['TTC_GTFS_URL']
          print(f"Fetching GTFS from {url}...", flush=True)

          req = urllib.request.Request(url, headers={'User-Agent': 'JATA-Transit-App/1.0'})
          with urllib.request.urlopen(req, timeout=30) as r:
              zip_bytes = r.read()

          stops = {}
          with zipfile.ZipFile(io.BytesIO(zip_bytes)) as zf:
              with zf.open('stops.txt') as f:
                  reader = csv.DictReader(io.TextIOWrapper(f, 'utf-8-sig'))
                  for row in reader:
                      sid = row['stop_id'].strip()
                      try:
                          stops[sid] = {
                              'name': row['stop_name'].strip(),
                              'lat': float(row['stop_lat']),
                              'lon': float(row['stop_lon']),
                          }
                      except (ValueError, KeyError):
                          pass  # skip malformed rows

          print(f"Parsed {len(stops)} stops", flush=True)

          out_path = 'backend/src/data/stops.json'
          os.makedirs(os.path.dirname(out_path), exist_ok=True)
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(stops, f, separators=(',', ':'), ensure_ascii=False)

          print(f"Written to {out_path}", flush=True)
          EOF

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/src/data/stops.json
          if git diff --cached --quiet; then
            echo "No changes to stops data — skipping commit"
          else
            STOP_COUNT=$(python3 -c "import json; d=json.load(open('backend/src/data/stops.json')); print(len(d))")
            git commit -m "chore: update TTC stops data (${STOP_COUNT} stops)"
            git push
            echo "Committed and pushed updated stops"
          fi
